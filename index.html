<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARI CLOUD | Fast Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .drop-zone { border: 2px dashed #38bdf8; transition: 0.3s; }
        .drop-zone.active { background: rgba(56, 189, 248, 0.1); border-color: #0ea5e9; }
        .neon-text { text-shadow: 0 0 10px #38bdf8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold neon-text tracking-widest uppercase">PARI CLOUD</h1>
            <p class="text-gray-400 mt-2">Deploy your static files instantly</p>
        </div>

        <div id="dropZone" class="drop-zone p-10 rounded-2xl text-center cursor-pointer mb-6">
            <i class="fas fa-cloud-upload-alt text-5xl text-sky-400 mb-4"></i>
            <p class="text-lg">Drag & Drop file here or <span class="text-sky-400 font-semibold">Browse</span></p>
            <input type="file" id="fileInput" class="hidden">
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Set Custom File Name</label>
                <input type="text" id="fileName" placeholder="e.g. my-project" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-sky-500">
            </div>
            
            <button onclick="uploadFile()" class="w-full bg-sky-600 hover:bg-sky-500 transition py-3 rounded-lg font-bold text-lg shadow-lg">
                UPLOAD TO CLOUD
            </button>
        </div>

        <div id="status" class="mt-6 hidden">
            <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-sky-500 h-full w-0 transition-all duration-500"></div>
            </div>
            <p class="text-sm text-center mt-2 text-gray-400">Uploading...</p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameInput = document.getElementById('fileName');

        dropZone.onclick = () => fileInput.click();

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            fileInput.files = e.dataTransfer.files;
            if(fileInput.files[0]) fileNameInput.value = fileInput.files[0].name.split('.')[0];
        };

        fileInput.onchange = () => {
            if(fileInput.files[0]) fileNameInput.value = fileInput.files[0].name.split('.')[0];
        };

        function uploadFile() {
            if(!fileInput.files[0]) return alert("Please select a file first!");
            
            document.getElementById('status').classList.remove('hidden');
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progressBar').style.width = progress + "%";
                if(progress >= 100) {
                    clearInterval(interval);
                    // Saving data to localStorage for demo purposes
                    localStorage.setItem('uploadedFileName', fileNameInput.value || 'untitled');
                    localStorage.setItem('uploadTime', new Date().toLocaleString());
                    window.location.href = 'view.html';
                }
            }, 200);
        }
    </script>
</body>
</html>
