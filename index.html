<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Host | Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .drop-zone--over { border: 2px dashed #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-lg rounded-2xl p-8 shadow-2xl">
        <h1 class="text-3xl font-bold mb-2 neon-text text-blue-500">Pari Cloud</h1>
        <p class="text-gray-400 mb-8">Fast & Secure File Hosting</p>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Custom File Name</label>
                <input type="text" id="fileName" placeholder="e.g. project-v1" 
                       class="w-full bg-black/50 border border-white/10 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition-all">
            </div>

            <div id="dropZone" class="border-2 border-dashed border-white/20 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400 transition-all">
                <div class="flex flex-col items-center">
                    <svg class="w-12 h-12 mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-lg">Drag & Drop file here</p>
                    <p class="text-sm text-gray-500 mt-2">or click to browse</p>
                </div>
                <input type="file" id="fileInput" class="hidden">
            </div>

            <div id="fileInfo" class="hidden glass bg-blue-500/10 p-3 rounded-lg flex justify-between items-center">
                <span id="selectedFileName" class="truncate text-sm"></span>
                <button onclick="resetFile()" class="text-red-400 hover:text-red-300 text-xs uppercase font-bold">Remove</button>
            </div>

            <button onclick="window.location.href='view.html'" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                Upload Now
            </button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const selectedFileName = document.getElementById('selectedFileName');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'drop'].forEach(type => {
            dropZone.addEventListener(type, () => dropZone.classList.remove('drop-zone--over'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            selectedFileName.textContent = file.name;
            fileInfo.classList.remove('hidden');
        }

        function resetFile() {
            fileInput.value = '';
            fileInfo.classList.add('hidden');
        }
    </script>
</body>
</html>
