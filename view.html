<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARI-VIEWER | Live Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00FFFF;
            --darker: #050510;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- Loading Overlay --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--primary);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            letter-spacing: 3px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            font-size: 0.8em;
        }

        /* --- Site Frame --- */
        #siteFrame {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
            background: white; /* Default background for the hosted site */
        }

        #error-display {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .error-icon {
            font-size: 4em;
            color: #ff00ff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff00ff;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">INITIALIZING SOURCE...</div>
    </div>

    <div id="error-display">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <h2>404 - SITE NOT FOUND</h2>
        <p>The requested deployment does not exist in local storage.</p>
        <a href="index.html" style="color: var(--primary); text-decoration: none; border: 1px solid var(--primary); padding: 10px 20px; border-radius: 5px;">Return to Deployer</a>
    </div>

    <iframe id="siteFrame"></iframe>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const siteName = urlParams.get('site');
            const loader = document.getElementById('loader');
            const frame = document.getElementById('siteFrame');
            const errorBox = document.getElementById('error-display');

            if (!siteName) {
                showError();
                return;
            }

            // Retrieve the HTML content (usually index.html)
            const htmlContent = localStorage.getItem(`site_${siteName}_index.html`);
            
            if (htmlContent) {
                // Attempt to find CSS and JS to inject if they exist
                const cssContent = localStorage.getItem(`site_${siteName}_style.css`) || "";
                const jsContent = localStorage.getItem(`site_${siteName}_script.js`) || "";

                // Construct a full document if only snippets were provided
                let finalDoc = htmlContent;

                // Inject CSS into head if not already there
                if (cssContent) {
                    const styleTag = `<style>${cssContent}</style>`;
                    finalDoc = finalDoc.replace('</head>', `${styleTag}</head>`);
                }

                // Inject JS before end of body
                if (jsContent) {
                    const scriptTag = `<script>${jsContent}<\/script>`;
                    finalDoc = finalDoc.replace('</body>', `${scriptTag}</body>`);
                }

                // Inject content into iframe
                const blob = new Blob([finalDoc], { type: 'text/html' });
                frame.src = URL.createObjectURL(blob);
                
                frame.onload = () => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        frame.style.display = 'block';
                    }, 500);
                };
            } else {
                showError();
            }

            function showError() {
                loader.style.display = 'none';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
