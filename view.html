<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Host | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold">Your Files</h1>
                <p class="text-gray-500 text-sm">Manage and share your hosted content</p>
            </div>
            <a href="index.html" class="bg-blue-600 px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-500 transition-colors">
                + New Upload
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-500 text-sm">Storage Used</p>
                <h2 class="text-2xl font-bold mt-1">1.2 GB / 5 GB</h2>
                <div class="w-full bg-white/10 h-2 rounded-full mt-3">
                    <div class="bg-blue-500 h-2 rounded-full" style="width: 24%"></div>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-500 text-sm">Total Files</p>
                <h2 class="text-2xl font-bold mt-1">12 Files</h2>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-500 text-sm">Bandwidth</p>
                <h2 class="text-2xl font-bold mt-1">Unlimited</h2>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-gray-400 text-xs uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Size</th>
                        <th class="px-6 py-4">Date</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <tr class="card-hover transition-colors">
                        <td class="px-6 py-4 flex items-center">
                            <span class="w-8 h-8 bg-pink-500/20 text-pink-500 rounded flex items-center justify-center mr-3 font-bold text-xs">ZIP</span>
                            project-v1.zip
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-400">45.0 MB</td>
                        <td class="px-6 py-4 text-sm text-gray-400">Apr 4, 2026</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-blue-400 hover:text-blue-300 mr-4">Link</button>
                            <button class="text-red-400 hover:text-red-300">Delete</button>
                        </td>
                    </tr>
                    <tr class="card-hover transition-colors">
                        <td class="px-6 py-4 flex items-center">
                            <span class="w-8 h-8 bg-blue-500/20 text-blue-400 rounded flex items-center justify-center mr-3 font-bold text-xs">JS</span>
                            script-pari.js
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-400">12.5 KB</td>
                        <td class="px-6 py-4 text-sm text-gray-400">Apr 3, 2026</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-blue-400 hover:text-blue-300 mr-4">Link</button>
                            <button class="text-red-400 hover:text-red-300">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
