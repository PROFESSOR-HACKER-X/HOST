<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hosted | PARI CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .link-box { background: #1e293b; border-left: 4px solid #38bdf8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full glass p-8 rounded-3xl text-center">
        <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-lg">
            <i class="fas fa-check-circle"></i>
        </div>

        <h1 class="text-3xl font-bold mb-2">File Hosted Successfully!</h1>
        <p class="text-gray-400 mb-8">Your file is now live on PARI CLOUD nodes.</p>

        <div class="text-left space-y-6">
            <div>
                <span class="text-xs font-bold text-sky-400 uppercase tracking-widest">Project Name</span>
                <p id="dispName" class="text-xl font-medium">---</p>
            </div>

            <div>
                <span class="text-xs font-bold text-sky-400 uppercase tracking-widest">Public Access Link</span>
                <div class="link-box p-4 mt-2 flex justify-between items-center rounded-r-lg">
                    <code id="fileLink" class="text-sky-300 break-all">https://pari-cloud.com/v/loading...</code>
                    <button onclick="copyLink()" class="ml-4 hover:text-sky-400"><i class="fas fa-copy"></i></button>
                </div>
            </div>
        </div>

        <div class="mt-10 flex gap-4">
            <a href="index.html" class="flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl transition">Upload New</a>
            <button onclick="alert('Opening hosted file...')" class="flex-1 bg-sky-600 hover:bg-sky-500 py-3 rounded-xl font-bold shadow-lg transition">View Live Site</button>
        </div>
    </div>

    <script>
        // Getting data from localStorage
        const name = localStorage.getItem('uploadedFileName') || 'Unnamed Project';
        const slug = name.toLowerCase().replace(/\s+/g, '-');
        
        document.getElementById('dispName').innerText = name;
        document.getElementById('fileLink').innerText = `https://pari-cloud.host/${slug}`;

        function copyLink() {
            const link = document.getElementById('fileLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
